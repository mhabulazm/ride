name: Release

on:
  push:
    tags:
      - 'ride-core-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no upload)'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-ride-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ride-core-v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG_VERSION cargo=$CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match workspace Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - run: cargo test -p ride-core
      - run: cargo clippy -p ride-core -- -D warnings

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: cargo publish -p ride-core --dry-run

      - name: Publish to crates.io
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p ride-core
